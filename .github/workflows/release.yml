name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            features: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            features: ""
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            features: ""
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            features: "--no-default-features"
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
            features: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
            features: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
            features: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --locked --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../mx-${{ matrix.target }}.tar.gz mx
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/mx.exe -DestinationPath mx-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mx-${{ matrix.target }}
          path: mx-${{ matrix.target }}.*

  publish-github:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: artifacts/*

  publish-crates:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
