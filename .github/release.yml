changelog:
  exclude:
    labels:
      - skip-changelog
    authors:
      - dependabot
  categories:
    - title: "🚀 Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "📦 Packages & Registry"
      labels:
        - registry
        - packages
    - title: "🌐 Website"
      labels:
        - website
    - title: "📖 Documentation"
      labels:
        - documentation
        - docs
    - title: "🔧 Maintenance"
      labels:
        - chore
        - ci
        - refactor
    - title: "Other Changes"
      labels:
        - "*"
